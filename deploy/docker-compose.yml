services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NODE_ENV: production
      PORT: 4000
    depends_on:
      - postgres
    expose:
      - "4000"

  prisma-studio:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    profiles: ["studio"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NODE_ENV: production
    depends_on:
      - postgres
    working_dir: /app/apps/api
    command:
      - sh
      - -c
      - pnpm exec prisma studio --schema=prisma/schema.prisma --hostname 0.0.0.0 --port 5555
    ports:
      - "127.0.0.1:5555:5555"

  web:
    build:
      context: ..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://api.dae-da.com}
    restart: always
    environment:
      NODE_ENV: production
      PORT: 3000
      API_BASE: ${API_BASE:-http://api:4000}
      GIFT_GROOM_BANK: ${GIFT_GROOM_BANK:-}
      GIFT_GROOM_ACCOUNT: ${GIFT_GROOM_ACCOUNT:-}
      GIFT_GROOM_KAKAO_URL: ${GIFT_GROOM_KAKAO_URL:-}
      GIFT_BRIDE_BANK: ${GIFT_BRIDE_BANK:-}
      GIFT_BRIDE_ACCOUNT: ${GIFT_BRIDE_ACCOUNT:-}
      GIFT_BRIDE_KAKAO_URL: ${GIFT_BRIDE_KAKAO_URL:-}
      GIFT_GROOM_FATHER_BANK: ${GIFT_GROOM_FATHER_BANK:-}
      GIFT_GROOM_FATHER_ACCOUNT: ${GIFT_GROOM_FATHER_ACCOUNT:-}
      GIFT_GROOM_FATHER_KAKAO_URL: ${GIFT_GROOM_FATHER_KAKAO_URL:-}
      GIFT_GROOM_MOTHER_BANK: ${GIFT_GROOM_MOTHER_BANK:-}
      GIFT_GROOM_MOTHER_ACCOUNT: ${GIFT_GROOM_MOTHER_ACCOUNT:-}
      GIFT_GROOM_MOTHER_KAKAO_URL: ${GIFT_GROOM_MOTHER_KAKAO_URL:-}
      GIFT_BRIDE_FATHER_BANK: ${GIFT_BRIDE_FATHER_BANK:-}
      GIFT_BRIDE_FATHER_ACCOUNT: ${GIFT_BRIDE_FATHER_ACCOUNT:-}
      GIFT_BRIDE_FATHER_KAKAO_URL: ${GIFT_BRIDE_FATHER_KAKAO_URL:-}
      GIFT_BRIDE_MOTHER_BANK: ${GIFT_BRIDE_MOTHER_BANK:-}
      GIFT_BRIDE_MOTHER_ACCOUNT: ${GIFT_BRIDE_MOTHER_ACCOUNT:-}
      GIFT_BRIDE_MOTHER_KAKAO_URL: ${GIFT_BRIDE_MOTHER_KAKAO_URL:-}
    depends_on:
      - api
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/daeseokdain.conf:/etc/nginx/conf.d/default.conf:ro
      - ${CF_SSL_CERT_DIR:-/etc/ssl/cloudflare}:/etc/ssl/cloudflare:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - web
      - api

  certbot:
    image: certbot/certbot
    profiles: ["letsencrypt"]
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: >
      sh -c 'trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done'

volumes:
  pgdata:
