# HTTP (80): ACME + HTTPS redirect
server {
    listen 80;
    server_name dae-da.com www.dae-da.com api.dae-da.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS frontend
server {
    listen 443 ssl;
    http2 on;
    server_name dae-da.com www.dae-da.com;

    ssl_certificate     /etc/letsencrypt/live/dae-da.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dae-da.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    resolver 127.0.0.11 ipv6=off valid=30s;

    location / {
        set $web_upstream web:3000;
        proxy_pass http://$web_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# HTTPS API
server {
    listen 443 ssl;
    http2 on;
    server_name api.dae-da.com;

    ssl_certificate     /etc/letsencrypt/live/dae-da.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dae-da.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    resolver 127.0.0.11 ipv6=off valid=30s;

    location / {
        set $api_upstream api:4000;
        proxy_pass http://$api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
