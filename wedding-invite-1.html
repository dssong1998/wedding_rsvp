<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<title>Wedding Invite Desktop Mockup</title>
<meta property="og:title" content="다인과 대석의 결혼식"/>
<meta property="og:description" content="저희의 결혼식에 자리를 채워 빛내주시면 정말 행복할 것 같습니다."/>
<meta property="og:image" content="/assets/images/wedding_poster.jpeg"/>

<style>
:root{
  --ease:cubic-bezier(.22,1,.36,1);
}
*{box-sizing:border-box}
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
}
body{
  background:#e9e9ec;
  display:flex;
  align-items:center;
  justify-content:center;
  width:100vw;
  height:100dvh;
  overflow:hidden;
  font-family:"Helvetica Neue",Helvetica,Arial,"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR",sans-serif;
}
body.desktop-invite-preloading{
  overflow:hidden;
}
body.desktop-invite-preloading .mock-wrap{
  visibility:hidden;
}
.desktop-invite-loading{
  position:fixed;
  inset:0;
  z-index:9999;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:14px;
  background:#10141d;
  color:#fffdf4;
  opacity:0;
  pointer-events:none;
  transition:opacity .24s ease;
}
body.desktop-invite-preloading .desktop-invite-loading{
  opacity:1;
  pointer-events:auto;
}
.desktop-invite-spinner{
  width:34px;
  height:34px;
  border-radius:50%;
  border:2px solid rgba(255,255,255,.3);
  border-top-color:#fffdf4;
  animation:desktopInviteSpin .9s linear infinite;
}
.desktop-invite-loading p{
  margin:0;
  font-size:14px;
  letter-spacing:.02em;
}
@keyframes desktopInviteSpin{
  to{transform:rotate(360deg)}
}

.mock-wrap{
  position:relative;
  width:100vw;
  height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:16px;
  overflow:hidden;
}
.device{
  position:relative;
  background:#17150f;
  padding:10px;
  box-shadow:0 50px 90px -34px rgba(0,0,0,.5),inset 0 0 0 2px #2a2722;
  transition:width .35s var(--ease),aspect-ratio .35s var(--ease),border-radius .35s var(--ease);
}
.device.land{
  width:100%;
  max-width:calc(100vw - 32px);
  aspect-ratio:19.5/9;
  border-radius:42px
}
.device.port{width:min(86vw,calc((100dvh - 32px)*9/19.5));aspect-ratio:9/19.5;border-radius:46px}
.screen{
  position:relative;
  width:100%;
  height:100%;
  border-radius:32px;
  overflow:hidden;
  background:#fff;
}
.device.port .screen{border-radius:36px}
.screen iframe{
  position:absolute;
  left:50%;
  top:50%;
  width:100%;
  height:100%;
  border:0;
  display:block;
  background:#fff;
  transform:translate(-50%,-50%);
  transform-origin:center center;
}
.device.land .screen iframe{
  width:46.153846%;
  height:216.666667%;
  transform:translate(-50%,-50%) rotate(-90deg);
}
.speaker{position:absolute;background:#000;opacity:.5;z-index:9;border-radius:4px}
.cam{position:absolute;background:#0b0b0b;width:7px;height:7px;border-radius:50%;box-shadow:inset 0 0 0 1px #333;z-index:9}
.device.land .speaker{left:8px;top:50%;transform:translateY(-50%);width:5px;height:20%}
.device.land .cam{left:17px;top:50%;transform:translateY(-50%)}
.device.port .speaker{top:9px;left:50%;transform:translateX(-50%);height:5px;width:20%}
.device.port .cam{top:9px;left:calc(50% + 16%)}
.hint{
  position:fixed;
  left:50%;
  bottom:10px;
  transform:translateX(-50%);
  color:#5f5a4f;
  font-size:12px;
  letter-spacing:.06em;
  text-transform:uppercase;
  pointer-events:none;
}
</style>
</head>
<body class="desktop-invite-preloading">
  <div class="desktop-invite-loading" id="desktopInviteLoading" role="status" aria-live="polite" aria-label="초대장 로딩 중">
    <div class="desktop-invite-spinner" aria-hidden="true"></div>
    <p>사진을 불러오는 중입니다...</p>
  </div>
  <div class="mock-wrap">
    <div class="device land" id="device">
      <div class="speaker" aria-hidden="true"></div>
      <div class="cam" aria-hidden="true"></div>
      <div class="screen">
        <iframe id="inviteFrame" src="about:blank" title="Wedding Invitation"></iframe>
      </div>
    </div>
    <div class="hint">Desktop Mockup Preview</div>
  </div>

<script>
(function(){
  var path=location.pathname||"";
  var isInvitePath=/^\/invited(?:@|%40)/i.test(path);
  var frame=document.getElementById("inviteFrame");
  var device=document.getElementById("device");
  var frameReady=false;
  var frameLoadFallbackTimer=null;
  var failSafeTimer=null;
  var frameModeWatcher=null;
  var activeMockMode="land";
  function postMockModeToFrame(mode){
    if(!frame||!frame.contentWindow)return;
    try{
      frame.contentWindow.postMessage({type:"desktop-mock-mode",mode:mode},"*");
    }catch(_){}
  }
  function setMockMode(mode,forceNotify){
    if(!device)return;
    var next=(mode==="port")?"port":"land";
    var changed=next!==activeMockMode;
    if(changed){
      activeMockMode=next;
      device.classList.toggle("port",next==="port");
      device.classList.toggle("land",next!=="port");
    }
    if(changed||forceNotify){
      postMockModeToFrame(next);
    }
  }
  function readFrameReplyMode(){
    if(!frame||!frame.contentWindow)return null;
    try{
      var doc=frame.contentDocument||frame.contentWindow.document;
      if(!doc)return null;
      var screen=doc.querySelector(".screen");
      if(!screen)return null;
      return screen.classList.contains("reply-mode")?"port":"land";
    }catch(_){
      return null;
    }
  }
  function watchFrameMode(){
    if(frameModeWatcher)clearInterval(frameModeWatcher);
    frameModeWatcher=setInterval(function(){
      var mode=readFrameReplyMode();
      if(mode)setMockMode(mode);
    },160);
  }
  function finishDesktopLoading(){
    if(frameReady)return;
    frameReady=true;
    clearTimeout(frameLoadFallbackTimer);
    clearTimeout(failSafeTimer);
    document.body.classList.remove("desktop-invite-preloading");
    var loading=document.getElementById("desktopInviteLoading");
    if(loading){
      setTimeout(function(){
        if(loading.parentNode)loading.parentNode.removeChild(loading);
      },260);
    }
  }
  function onInviteReadyMessage(event){
    if(!frame||event.source!==frame.contentWindow)return;
    var data=event.data;
    if(!data||typeof data!=="object")return;
    if(data.type==="desktop-mock-mode-sync-request"){
      postMockModeToFrame(activeMockMode);
      return;
    }
    if(data.type==="invite-ready"){
      finishDesktopLoading();
      var mode=readFrameReplyMode();
      if(mode){
        setMockMode(mode,true);
      }else{
        postMockModeToFrame(activeMockMode);
      }
    }
  }
  window.addEventListener("message",onInviteReadyMessage);
  function buildEmbedTarget(){
    if(isInvitePath){
      var url=new URL(location.href);
      url.searchParams.set("embed","1");
      var q=url.searchParams.toString();
      return url.pathname+(q?("?"+q):"")+url.hash;
    }
    return "wedding-invite-2.html?embed=1";
  }
  var ua=navigator.userAgent||"";
  var isMobileUA=/Android|iPhone|iPad|iPod|Mobile/i.test(ua);
  var coarse=window.matchMedia&&window.matchMedia("(pointer: coarse)").matches;
  if(isMobileUA||coarse){
    location.replace(buildEmbedTarget());
    return;
  }
  if(frame){
    frame.addEventListener("load",function(){
      clearTimeout(frameLoadFallbackTimer);
      frameLoadFallbackTimer=setTimeout(finishDesktopLoading,3200);
      setMockMode("land",true);
      watchFrameMode();
    });
    frame.src=buildEmbedTarget();
  }else{
    finishDesktopLoading();
  }
  failSafeTimer=setTimeout(finishDesktopLoading,12000);
  setMockMode("land");
  window.addEventListener("beforeunload",function(){
    if(frameModeWatcher)clearInterval(frameModeWatcher);
    frameModeWatcher=null;
  });
})();
</script>
</body>
</html>
